name: Agent Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Python Backend ──────────────────────────────────────────────────────────
  validate-python:
    name: Validate Python Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit safety

      - name: Run Ruff linter
        run: ruff check app/

      - name: Run Python validator
        run: python ../.ai/validation/validate_python.py --path app/

      - name: Run mypy type checking
        run: mypy app/ --ignore-missing-imports

      - name: Run bandit SAST
        run: bandit -r app/ -x tests/ -ll --skip B608,B310

      - name: Run safety dependency scan
        run: safety check -r requirements.txt --ignore 67584,84963,94066,65293,64930 --ignore 70612 --ignore SFTY-20260404-69047

      - name: Run pytest with coverage
        run: pytest -v --cov=app --cov-report=term-missing --cov-report=json:coverage/coverage.json --cov-fail-under=30 --ignore=../scripts --ignore=tests/unit/test_delegation_contract.py --ignore=tests/unit/test_web3_client.py --ignore=tests/unit/test_payment_verifier.py --ignore=tests/unit/test_pix_client.py tests/unit/

      - name: Generate coverage badge
        run: python ../scripts/ci/generate_coverage_badge.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage/coverage-badge.svg

  # ─── Node.js Service ─────────────────────────────────────────────────────────
  validate-node:
    name: Validate Node.js Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./node-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./node-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit --project tsconfig.test.json

      - name: Run tests with coverage
        run: npm test

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  # ─── Solidity Contracts ──────────────────────────────────────────────────────
  validate-solidity:
    name: Validate Solidity Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Forge build
        run: forge build --force

      - name: Run Solidity validator
        run: python ../.ai/validation/validate_solidity.py --path src/

      - name: Run Forge tests
        run: forge test -vvv

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither static analysis
        run: slither . --filter-paths "lib/" --exclude-dependencies --fail-low || true

  # ─── Docker Compose Validation ───────────────────────────────────────────────
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet || docker-compose config --quiet || true
