name: Agent Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-python:
    name: Validate Python Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check app/ --quiet

      - name: Run Python validator
        run: python .ai/validation/validate_python.py --path app/

      - name: Run mypy (if config exists)
        run: mypy app/ --ignore-missing-imports || true

  validate-solidity:
    name: Validate Solidity Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Forge build
        run: forge build --force

      - name: Run Solidity validator
        run: python ../.ai/validation/validate_solidity.py --path src/

      - name: Run Forge tests
        run: forge test -vvv

  validate-node:
    name: Validate Node.js Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./node-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Check for package.json
        id: check-node
        run: |
          if [ -f package.json ]; then
            echo "has-node=true" >> $GITHUB_OUTPUT
          else
            echo "has-node=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check-node.outputs.has-node == 'true'
        run: npm install

      - name: Run TypeScript compiler
        if: steps.check-node.outputs.has-node == 'true'
        run: npx tsc --noEmit || true

  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet || docker-compose config --quiet || true
